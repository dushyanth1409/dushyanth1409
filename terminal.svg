<svg width="760" height="340" viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal-style about card for Dushyanth">
  <defs>
    <style>
      .mono { font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace; }
      .prompt { fill: #7ee787; }
      .cmd { fill: #e6edf3; }
      .key { fill: #79c0ff; }
      .val { fill: #c9d1d9; }
      .comment { fill: #8b949e; }
      .title { fill: #8b949e; }
    </style>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="760" height="340" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- title bar -->
  <rect x="0" y="0" width="760" height="40" rx="12" fill="#161b22"/>
  <rect x="0" y="28" width="760" height="12" fill="#161b22"/>
  <line x1="0" y1="40" x2="760" y2="40" stroke="#30363d" stroke-width="1"/>

  <!-- dots -->
  <circle cx="22" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="20" r="6" fill="#27c93f"/>
  <text x="380" y="25" class="mono title" font-size="13" text-anchor="middle">dushyanth — zsh</text>

  <!-- body -->
  <g class="mono" font-size="15">
    <text x="24" y="78"><tspan class="prompt">➜  ~</tspan> <tspan class="cmd">who_am_i</tspan></text>
    <text x="24" y="102" class="val">M.Sc. Electromobility · Embedded systems enthusiast · Mechanical Engineer</text>

    <text x="24" y="138"><tspan class="prompt">➜  ~</tspan> <tspan class="cmd">cat profile.txt</tspan></text>
    <text x="24" y="162"><tspan class="key">building </tspan><tspan class="val">→ CAN bus fault detection &amp; anomaly monitoring (Python & YAML)</tspan></text>
    <text x="24" y="184"><tspan class="key">learning </tspan><tspan class="val">→ embedded firmware, HIL testing</tspan></text>
    <text x="24" y="206"><tspan class="key">speaking </tspan><tspan class="val">→ English, learning Deutsch (B1)</tspan></text>
    <text x="24" y="228"><tspan class="key">based_in </tspan><tspan class="val">→ Erlangen, Germany</tspan></text>
    <text x="24" y="252" class="comment"># open to embedded / test roles in Germany &amp; India </text>

    <text x="24" y="288"><tspan class="prompt">➜  ~</tspan> <tspan class="cmd">_</tspan><tspan class="cmd"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>▋</tspan></text>
  </g>
</svg>
